---
- name: apply raspi_config
  ansible.builtin.command: raspi-config --apply-os-config
  changed_when: false

- name: reboot
  ansible.builtin.reboot:
    reboot_timeout: "{{ raspi_config_reboot_max_wait_time }}"
    post_reboot_delay: "{{ raspi_config_reboot_min_time }}"

- name: remove default user
  ansible.builtin.user:
    name: "{{ raspi_config_auth_test_username }}"
    state: absent
    force: true
  when: raspi_config_replace_user['name'] != raspi_config_auth_test_username
  ignore_errors: true

- name: restart timezone dependent services
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  loop: "{{ raspi_config_timezone_dependent_services }}"

- name: Restart timesyncd service
  ansible.builtin.service:
    name: systemd-timesyncd
    state: restarted

- name: restart networking
  ansible.builtin.systemd:
    name: networking
    state: restarted
  ignore_errors: true

- name: restart ntp
  ansible.builtin.systemd:
    name: ntp
    state: restarted
